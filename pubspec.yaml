name: musa
description: A minimalist, AI-assisted writing application, local-first.
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.5
  google_fonts: ^6.2.1
  path_provider: ^2.1.2
  path: ^1.9.0
  json_annotation: ^4.8.1
  http: ^1.2.1
  shared_preferences: ^2.2.2
  ffi: ^2.1.2
  crypto: ^3.0.3
  printing: ^5.14.3
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
